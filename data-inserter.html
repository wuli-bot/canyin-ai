function setStatus(id, cls, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + cls;
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function apiGet(path) {
  const resp = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY }
  });
  if (!resp.ok) throw new Error(`GET ${path}: ${resp.status} ${resp.statusText}`);
  return resp.json();
}

async function apiPost(table, rows, conflictCols) {
  const headers = {
    'apikey': SERVICE_KEY,
    'Authorization': 'Bearer ' + SERVICE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
  if (conflictCols) {
    headers['Prefer'] = 'return=representation,resolution=ignore-duplicates';
    headers['on-conflict'] = conflictCols;
  }
  const resp = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify(rows)
  });
  const text = await resp.text();
  if (!resp.ok) {
    // Try to parse error
    try {
      const err = JSON.parse(text);
      return { error: err.message || text, status: resp.status };
    } catch(e) {
      return { error: text, status: resp.status };
    }
  }
  try { return { data: JSON.parse(text), status: resp.status }; }
  catch(e) { return { data: null, status: resp.status, count: rows.length }; }
}

async function runAll() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 加载中...';
  
  const results = {};
  
  try {
    // Step 0: Get store ID
    setStatus('storeStatus', 'running', '🔍 查询门店ID...');
    const stores = await apiGet('stores?store_code=eq.WM001&select=id,store_name');
    if (!stores || stores.length === 0) {
      setStatus('storeStatus', 'error', '❌ 未找到WM001门店，请先执行建表SQL');
      return;
    }
    const storeId = stores[0].id;
    setStatus('storeStatus', 'success', `✅ 门店ID: ${storeId} (${stores[0].store_name})`);
    
    // Step 1: Insert store_dishes
    setStatus('dishStatus', 'running', `🍽️ 插入${DATA.store_dishes.length}条菜品数据...`);
    const dishes = DATA.store_dishes.map(d => ({ ...d, store_id: storeId }));
    const dishResult = await apiPost('store_dishes', dishes);
    if (dishResult.error) {
      setStatus('dishStatus', 'error', `❌ 菜品插入失败: ${dishResult.error}`);
      results.dishes = `失败: ${dishResult.error}`;
    } else {
      const cnt = dishResult.data ? dishResult.data.length : dishes.length;
      setStatus('dishStatus', 'success', `✅ 菜品插入成功: ${cnt}条`);
      results.dishes = `${cnt}条`;
    }
    
    // Step 2: Insert store_daily_summary
    setStatus('summaryStatus', 'running', `📊 插入${DATA.store_daily_summary.length}条日报数据...`);
    const summaries = DATA.store_daily_summary.map(d => ({ 
      ...d, 
      store_id: storeId,
      gross_margin_pct: d.total_revenue > 0 ? Math.round(d.gross_profit / d.total_revenue * 100 * 10) / 10 : 0,
      avg_order_value: d.order_count > 0 ? Math.round(d.total_revenue / d.order_count * 10) / 10 : 0,
      food_safety_score: 95 + Math.floor(Math.random() * 5)
    }));
    const sumResult = await apiPost('store_daily_summary', summaries, 'store_id,summary_date');
    if (sumResult.error) {
      setStatus('summaryStatus', 'error', `❌ 日报插入失败: ${sumResult.error}`);
      results.summary = `失败: ${sumResult.error}`;
    } else {
      const cnt = sumResult.data ? sumResult.data.length : summaries.length;
      setStatus('summaryStatus', 'success', `✅ 日报插入成功: ${cnt}条`);
      results.summary = `${cnt}条`;
    }
    
    // Step 3: Insert store_transactions
    setStatus('transStatus', 'running', `💰 插入${DATA.store_transactions.length}条交易数据...`);
    const trans = DATA.store_transactions.map(d => ({ ...d, store_id: storeId }));
    const transResult = await apiPost('store_transactions', trans);
    if (transResult.error) {
      setStatus('transStatus', 'error', `❌ 交易插入失败: ${transResult.error}`);
      results.trans = `失败: ${transResult.error}`;
    } else {
      const cnt = transResult.data ? transResult.data.length : trans.length;
      setStatus('transStatus', 'success', `✅ 交易插入成功: ${cnt}条`);
      results.trans = `${cnt}条`;
    }
    
    // Step 4: Insert ingredient_inventory
    setStatus('invStatus', 'running', `📦 插入${DATA.ingredient_inventory.length}条库存数据...`);
    const inv = DATA.ingredient_inventory.map(d => ({ ...d, supplier_id: null }));
    const invResult = await apiPost('ingredient_inventory', inv);
    if (invResult.error) {
      // Try one by one for inventory (might have duplicate batch_no)
      let ok = 0, fail = 0;
      for (const item of inv) {
        const r = await apiPost('ingredient_inventory', [item]);
        if (r.error) fail++; else ok++;
      }
      if (ok > 0) {
        setStatus('invStatus', 'success', `✅ 库存插入成功: ${ok}条 (跳过${fail}条重复)`);
        results.inv = `${ok}条 (跳过${fail}条)`;
      } else {
        setStatus('invStatus', 'error', `❌ 库存插入失败: ${invResult.error}`);
        results.inv = `失败`;
      }
    } else {
      const cnt = invResult.data ? invResult.data.length : inv.length;
      setStatus('invStatus', 'success', `✅ 库存插入成功: ${cnt}条`);
      results.inv = `${cnt}条`;
    }
    
    // Step 5: Verify
    setStatus('storeStatus', 'running', '🔍 验证数据...');
    const verifyDishes = await apiGet('store_dishes?store_id=eq.' + storeId + '&select=id');
    const verifySummary = await apiGet('store_daily_summary?store_id=eq.' + storeId + '&select=id');
    const verifyTrans = await apiGet('store_transactions?store_id=eq.' + storeId + '&select=id');
    const verifyInv = await apiGet('ingredient_inventory?select=id&limit=100');
    
    const detail = `
      <div>门店: ✅ ${storeId}</div>
      <div>菜品: ${verifyDishes.length} 条 ${verifyDishes.length === 28 ? '✅' : '⚠️'}</div>
      <div>日报: ${verifySummary.length} 条 ${verifySummary.length === 15 ? '✅' : '⚠️'}</div>
      <div>交易: ${verifyTrans.length} 条 ${verifyTrans.length === 9 ? '✅' : '⚠️'}</div>
      <div>库存: ${verifyInv.length} 条 ${verifyInv.length >= 18 ? '✅' : '⚠️'}</div>
      <hr style="margin:8px 0;border-color:#334155">
      <div style="margin-top:8px;font-size:0.85em;color:#94a3b8">插入结果: 菜品${results.dishes||'-'}, 日报${results.summary||'-'}, 交易${results.trans||'-'}, 库存${results.inv||'-'}</div>
    `;
    document.getElementById('resultDetail').innerHTML = detail;
    document.getElementById('resultArea').classList.remove('hidden');
    setStatus('storeStatus', 'success', '✅ 全部完成！');
    
  } catch (err) {
    setStatus('storeStatus', 'error', '❌ 错误: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 重新加载';
  }
}
