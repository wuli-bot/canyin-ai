var CATEGORY_MAP={chaofan:"炒饭",naicha:"奶茶",shaokao:"烧烤",huoguo:"火锅",fenmian:"粉面",qita:"其他"};
var MODE_MAP={tangshi:"堂食",waimai:"外卖",both:"堂食+外卖"};

function generate(){
var cat=document.getElementById("category").value;
var modeEl=document.querySelector('input[name="mode"]:checked');
if(!cat||!modeEl){alert("请选择品类和经营方式");return}
var mode=modeEl.value;
var data=DATA[cat]&&DATA[cat][mode];
if(!data){alert("暂无该组合数据");return}
renderResult(data,cat,mode);
saveHistory(cat,mode);
}

function renderResult(data,cat,mode){
var html='<div class="result-title">开店清单 — '+CATEGORY_MAP[cat]+'（'+MODE_MAP[mode]+'）</div>';
var totalDays="";
data.stages.forEach(function(s,i){
html+='<div class="stage fade-in'+(i===0?" open":"")+'" style="animation-delay:'+(i*0.08)+'s">';
html+='<div class="stage-header" onclick="toggleStage(this)">';
html+='<div class="stage-icon">'+s.icon+'</div>';
html+='<div class="stage-info"><div class="stage-name">'+s.name+'</div>';
html+='<div class="stage-days">'+s.days+'</div></div>';
html+='<div class="stage-arrow">▼</div></div>';
html+='<div class="stage-body"><div class="stage-content">';
html+='<ul class="todo-list">';
s.todos.forEach(function(t){
html+='<li class="todo-item"><span class="todo-dot"></span><span>'+t+'</span></li>';
});
html+='</ul>';
html+='<div class="note">💡 '+s.note+'</div>';
html+='</div></div></div>';
});
document.getElementById("result").innerHTML=html;
document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"});
}

function toggleStage(el){
el.parentElement.classList.toggle("open");
}

function saveHistory(cat,mode){
var records=JSON.parse(localStorage.getItem("opening_records")||"[]");
var item={cat:cat,mode:mode,time:new Date().toLocaleString("zh-CN")};
records=records.filter(function(r){return !(r.cat===cat&&r.mode===mode)});
records.unshift(item);
if(records.length>10)records=records.slice(0,10);
localStorage.setItem("opening_records",JSON.stringify(records));
renderHistory();
}

function renderHistory(){
var records=JSON.parse(localStorage.getItem("opening_records")||"[]");
if(!records.length)return;
var html='<div class="history-title">最近记录</div>';
records.forEach(function(r){
html+='<div class="history-item" onclick="loadHistory(\''+r.cat+'\',\''+r.mode+'\')">';
html+='<span class="history-text">'+CATEGORY_MAP[r.cat]+' · '+MODE_MAP[r.mode]+'</span>';
html+='<span class="history-time">'+r.time+'</span></div>';
});
document.getElementById("history").innerHTML=html;
}

function loadHistory(cat,mode){
document.getElementById("category").value=cat;
var radios=document.querySelectorAll('input[name="mode"]');
radios.forEach(function(r){if(r.value===mode)r.checked=true});
var data=DATA[cat]&&DATA[cat][mode];
if(data)renderResult(data,cat,mode);
}

renderHistory();
</script>
