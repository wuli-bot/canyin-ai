<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成本核算</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px 16px 60px}
.wrap{width:100%;max-width:520px}
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:1.6rem;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:#94a3b8;font-size:.88rem;margin-top:6px}
.card{background:#1e293b;border-radius:16px;padding:24px;margin-bottom:20px}
label{display:block;font-size:.82rem;color:#94a3b8;margin-bottom:6px;font-weight:500}
input[type=text],input[type=number]{width:100%;background:#0f172a;border:1px solid #334155;border-radius:12px;padding:12px 14px;color:#e2e8f0;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#f97316}
.row{display:flex;gap:12px;margin-bottom:16px}
.row>div{flex:1}
.ingredients-title{font-size:.88rem;color:#94a3b8;margin-bottom:10px;font-weight:500}
.ing-table{width:100%;border-collapse:separate;border-spacing:0 8px}
.ing-table th{font-size:.75rem;color:#64748b;text-align:left;padding:0 4px 4px;font-weight:500}
.ing-table td{padding:0 4px}
.ing-table td:first-child{width:40%}
.ing-table td:nth-child(2),.ing-table td:nth-child(3){width:25%}
.ing-table input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 10px;color:#e2e8f0;font-size:.92rem;outline:none;transition:border .2s}
.ing-table input:focus{border-color:#f97316}
.ing-table td:last-child{width:auto;padding-left:6px}
.btn-del{background:none;border:none;color:#475569;font-size:1.1rem;cursor:pointer;padding:4px;border-radius:6px;transition:color .2s}
.btn-del:hover{color:#ef4444}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;background:transparent;border:1px dashed #334155;border-radius:12px;color:#94a3b8;font-size:.88rem;cursor:pointer;transition:all .2s;margin-top:4px}
.add-btn:hover{border-color:#f97316;color:#fbbf24}
.calc-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#fbbf24,#f97316);border:none;border-radius:50px;color:#0f172a;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:opacity .2s;letter-spacing:1px}
.calc-btn:hover{opacity:.9}
.calc-btn:active{transform:scale(.98)}
.result-area{display:none}
.result-card{background:#1e293b;border-radius:14px;padding:20px;margin-bottom:14px;border-left:3px solid #f97316}
.result-card h3{font-size:.95rem;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #334155}
.result-row:last-child{border-bottom:none}
.result-row .label{color:#94a3b8;font-size:.88rem}
.result-row .value{font-weight:600;font-size:1rem}
.highlight{color:#fbbf24}
.stars{letter-spacing:2px}
.platform-tag{font-size:.7rem;padding:2px 8px;border-radius:20px;color:#0f172a;font-weight:600}
.platform-tag.meituan{background:#ffc107}
.platform-tag.jd{background:#ef4444}
.platform-tag.ele{background:#3b82f6}
.platform-tag.douyin{background:#a855f7}
.platform-detail{font-size:.78rem;color:#64748b;margin-left:4px}
.history-toggle{text-align:center;margin-top:24px;cursor:pointer;color:#475569;font-size:.8rem;transition:color .2s}
.history-toggle:hover{color:#94a3b8}
.history-list{display:none;margin-top:12px}
.history-item{background:#1e293b;border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s}
.history-item:hover{background:#273548}
.history-item .hi-name{font-weight:500;font-size:.9rem}
.history-item .hi-meta{font-size:.78rem;color:#64748b}
.empty{text-align:center;color:#475569;font-size:.85rem;padding:20px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>📊 成本核算</h1>
    <p>输入食材，帮你算清每道菜的成本和利润</p>
  </div>

  <div class="card">
    <label>菜名</label>
    <input type="text" id="dishName" placeholder="如：宫保鸡丁">

    <div class="row" style="margin-top:16px">
      <div style="flex:2">
        <label>售价（元）</label>
        <input type="number" id="price" placeholder="28" step="0.1" min="0">
      </div>
    </div>

    <div class="ingredients-title" style="margin-top:8px">食材清单</div>
    <table class="ing-table">
      <thead><tr><th>食材</th><th>用量</th><th>单价(元)</th><th></th></tr></thead>
      <tbody id="ingBody">
        <tr>
          <td><input type="text" placeholder="鸡肉"></td>
          <td><input type="number" placeholder="300" step="0.1" min="0"></td>
          <td><input type="number" placeholder="0.02" step="0.001" min="0"></td>
          <td><button class="btn-del" onclick="delRow(this)">×</button></td>
        </tr>
        <tr>
          <td><input type="text" placeholder="花生"></td>
          <td><input type="number" placeholder="50" step="0.1" min="0"></td>
          <td><input type="number" placeholder="0.04" step="0.001" min="0"></td>
          <td><button class="btn-del" onclick="delRow(this)">×</button></td>
        </tr>
      </tbody>
    </table>
    <button class="add-btn" onclick="addRow()">+ 添加食材</button>

    <button class="calc-btn" onclick="calculate()">一键算成本</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-card" id="costCard">
      <h3>📊 成本明细</h3>
      <div id="costDetails"></div>
    </div>
    <div class="result-card" id="platformCard">
      <h3>💰 各平台定价建议</h3>
      <div id="platformDetails"></div>
    </div>
  </div>

  <div class="history-toggle" onclick="toggleHistory()">历史记录</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
function addRow(name, qty, price) {
  var tr = document.createElement('tr');
  tr.innerHTML = '<td><input type="text" placeholder="食材名"' + (name ? ' value="' + name + '"' : '') + '></td>' +
    '<td><input type="number" placeholder="0" step="0.1" min="0"' + (qty ? ' value="' + qty + '"' : '') + '></td>' +
    '<td><input type="number" placeholder="0" step="0.001" min="0"' + (price ? ' value="' + price + '"' : '') + '></td>' +
    '<td><button class="btn-del" onclick="delRow(this)">×</button></td>';
  document.getElementById('ingBody').appendChild(tr);
}

function delRow(btn) {
  var tbody = document.getElementById('ingBody');
  if (tbody.rows.length > 1) {
    btn.closest('tr').remove();
  }
}

function calculate() {
  var name = document.getElementById('dishName').value.trim();
  var price = parseFloat(document.getElementById('price').value);

  if (!name) { alert('请输入菜名'); return; }
  if (!price || price <= 0) { alert('请输入有效售价'); return; }

  var rows = document.getElementById('ingBody').rows;
  var foodCost = 0;
  var items = [];
  var hasIngredient = false;

  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input');
    var iName = inputs[0].value.trim();
    var iQty = parseFloat(inputs[1].value) || 0;
    var iPrice = parseFloat(inputs[2].value) || 0;
    if (iName && (iQty > 0 || iPrice > 0)) {
      hasIngredient = true;
      var sub = iQty * iPrice;
      foodCost += sub;
      items.push({ name: iName, qty: iQty, price: iPrice, sub: sub });
    }
  }

  if (!hasIngredient) { alert('请至少添加一项食材'); return; }

  var wasteRate = 0.05;
  var actualCost = foodCost * (1 + wasteRate);
  var margin = ((price - actualCost) / price * 100);
  var stars, level, color;

  if (margin > 65) { stars = '⭐⭐⭐⭐⭐'; level = '优秀'; color = '#22c55e'; }
  else if (margin > 55) { stars = '⭐⭐⭐⭐'; level = '良好'; color = '#84cc16'; }
  else if (margin > 45) { stars = '⭐⭐⭐'; level = '一般'; color = '#f59e0b'; }
  else { stars = '⭐⭐'; level = '危险'; color = '#ef4444'; }

  var costHTML = '';
  items.forEach(function(it) {
    costHTML += '<div class="result-row"><span class="label">' + it.name + ' ' + it.qty + '×' + it.price + '</span><span class="value">¥' + it.sub.toFixed(2) + '</span></div>';
  });
  costHTML += '<div class="result-row"><span class="label">食材小计</span><span class="value">¥' + foodCost.toFixed(2) + '</span></div>';
  costHTML += '<div class="result-row"><span class="label">损耗(5%)</span><span class="value">¥' + (foodCost * wasteRate).toFixed(2) + '</span></div>';
  costHTML += '<div class="result-row"><span class="label">实际成本</span><span class="value highlight">¥' + actualCost.toFixed(2) + '</span></div>';
  costHTML += '<div class="result-row"><span class="label">毛利率</span><span class="value" style="color:' + color + '">' + margin.toFixed(1) + '%</span></div>';
  costHTML += '<div class="result-row"><span class="label">健康度</span><span class="value"><span class="stars">' + stars + '</span> ' + level + '</span></div>';
  document.getElementById('costDetails').innerHTML = costHTML;

  var platforms = [
    { name: '美团', cls: 'meituan', commission: 0.20, delivery: 4 },
    { name: '京东', cls: 'jd', commission: 0.08, delivery: 3 },
    { name: '饿了么', cls: 'ele', commission: 0.20, delivery: 4 },
    { name: '抖音', cls: 'douyin', commission: 0.05, delivery: 3 }
  ];

  var platHTML = '';
  platforms.forEach(function(p) {
    var suggested = actualCost / (1 - p.commission - 0.03) + p.delivery * 0.3;
    suggested = Math.ceil(suggested / 5) * 5;
    if (suggested < price) suggested = Math.ceil(price / 5) * 5;
    var到手 = suggested * (1 - p.commission) - p.delivery * 0.3;
    var platMargin = ((到手 - actualCost) / 到手 * 100);

    platHTML += '<div class="result-row">' +
      '<span class="label"><span class="platform-tag ' + p.cls + '">' + p.name + '</span>' +
      '<span class="platform-detail">到手 ¥' + 到手.toFixed(1) + ' · 毛利' + platMargin.toFixed(0) + '%</span></span>' +
      '<span class="value highlight">¥' + suggested.toFixed(0) + '</span></div>';
  });
  document.getElementById('platformDetails').innerHTML = platHTML;

  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });

  saveHistory(name, price, actualCost, margin);
}

function saveHistory(name, price, cost, margin) {
  var list = JSON.parse(localStorage.getItem('costHistory') || '[]');
  var exists = false;
  for (var i = 0; i < list.length; i++) {
    if (list[i].name === name) {
      list[i].price = price;
      list[i].cost = cost;
      list[i].margin = margin;
      list[i].time = Date.now();
      exists = true;
      break;
    }
  }
  if (!exists) {
    list.unshift({ name: name, price: price, cost: cost, margin: margin, time: Date.now() });
  }
  if (list.length > 20) list = list.slice(0, 20);
  localStorage.setItem('costHistory', JSON.stringify(list));
  renderHistory();
}

function renderHistory() {
  var list = JSON.parse(localStorage.getItem('costHistory') || '[]');
  var container = document.getElementById('historyList');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">暂无记录</div>';
    return;
  }
  var html = '';
  list.forEach(function(item, idx) {
    var d = new Date(item.time);
    var dateStr = (d.getMonth() + 1) + '/' + d.getDate();
    html += '<div class="history-item" onclick="loadHistory(' + idx + ')">' +
      '<div><div class="hi-name">' + item.name + '</div>' +
      '<div class="hi-meta">' + dateStr + ' · 售价¥' + item.price + ' · 成本¥' + item.cost.toFixed(1) + '</div></div>' +
      '<div class="hi-meta" style="color:' + (item.margin > 55 ? '#22c55e' : item.margin > 45 ? '#f59e0b' : '#ef4444') + '">' + item.margin.toFixed(0) + '%</div></div>';
  });
  container.innerHTML = html;
}

function loadHistory(idx) {
  var list = JSON.parse(localStorage.getItem('costHistory') || '[]');
  if (!list[idx]) return;
  document.getElementById('dishName').value = list[idx].name;
  document.getElementById('price').value = list[idx].price;
}

function toggleHistory() {
  var el = document.getElementById('historyList');
  if (el.style.display === 'block') {
    el.style.display = 'none';
  } else {
    renderHistory();
    el.style.display = 'block';
  }
}

renderHistory();
</script>
</body>
</html>
