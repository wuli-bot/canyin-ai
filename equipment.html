<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备选型助手 - AI店长感知层配置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px 12px 40px}
.app{width:100%;max-width:520px}
h1{font-size:1.5rem;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;font-size:.85rem;color:#94a3b8;margin-bottom:24px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px}
label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:6px;font-weight:500}
input[type=text],input[type=number]{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#fbbf24}
.field{margin-bottom:14px}
.field:last-of-type{margin-bottom:0}
.input-wrap{position:relative}
.input-wrap .unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;font-size:.85rem;pointer-events:none}
.btn{width:100%;padding:14px;border:none;border-radius:50px;background:linear-gradient(135deg,#fbbf24,#f97316);color:#0f172a;font-size:1rem;font-weight:700;cursor:pointer;margin-top:18px;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.result{display:none}
.result.show{display:block}
/* AI intro banner */
.ai-banner{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #f9731644;border-radius:16px;padding:16px 20px;margin-bottom:16px}
.ai-banner-title{font-size:1rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ai-banner-desc{font-size:.8rem;color:#94a3b8;line-height:1.6}
/* summary card */
.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.summary-label{font-size:.85rem;color:#94a3b8}
.summary-val{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.budget-info{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px}
.budget-info .total{color:#94a3b8}
.budget-info .spent{font-weight:700}
.bar-bg{height:8px;background:#334155;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease,background .3s}
.bar-green{background:#22c55e}
.bar-yellow{background:#eab308}
.bar-red{background:#ef4444}
.over-tag{display:inline-block;background:#ef444422;color:#ef4444;font-size:.75rem;padding:2px 8px;border-radius:20px;margin-top:6px}
.budget-note{font-size:.75rem;margin-top:4px}
/* section */
.section-title{font-size:.95rem;font-weight:700;margin:18px 0 10px;display:flex;align-items:center;gap:6px}
.section-title .tag{font-size:.65rem;padding:2px 8px;border-radius:20px}
.tag-p0{background:#f9731622;color:#f97316}
.tag-p1{background:#334155;color:#94a3b8}
.tag-req{background:#22c55e22;color:#22c55e}
.tag-opt{background:#eab30822;color:#eab308}
/* equipment card */
.eq-card{border-left:3px solid #f97316;background:#0f172a;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:10px}
.eq-card:last-child{margin-bottom:0}
.eq-card.optional{border-left-color:#475569;opacity:.7}
.eq-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.eq-name{font-size:.9rem;font-weight:600}
.eq-price{font-size:.9rem;font-weight:700;color:#fbbf24;white-space:nowrap}
.eq-line{display:flex;align-items:flex-start;gap:6px;font-size:.8rem;line-height:1.5;margin-bottom:3px}
.eq-line .ico{flex-shrink:0;width:16px;text-align:center;font-size:.85rem}
.eq-func{color:#cbd5e1}
.eq-ai{color:#fbbf24}
.eq-miss{color:#ef4444;opacity:.85}
/* tips & channels */
.tips{font-size:.85rem;color:#94a3b8;line-height:1.7}
.tips li{margin-bottom:4px;list-style:none;padding-left:16px;position:relative}
.tips li::before{content:"•";position:absolute;left:0;color:#fbbf24}
.channels{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{background:#0f172a;border:1px solid #334155;border-radius:20px;padding:6px 14px;font-size:.8rem;color:#e2e8f0}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</head>
<body>
<div class="app">
  <h1>🔧 设备选型</h1>

  <div class="card">

      <datalist id="cat-list">
        <option value="炒饭">
        <option value="盖码饭">
        <option value="面条">
        <option value="粉">
        <option value="麻辣烫">
        <option value="火锅">
        <option value="烧烤">
        <option value="炸鸡">
        <option value="奶茶">
        <option value="咖啡">
        <option value="轻食">
        <option value="汉堡">
        <option value="披萨">
        <option value="甜品">
        <option value="小吃">
        <option value="快餐">
        <option value="粥">
        <option value="饺子">
        <option value="包子">
        <option value="烤鱼">
        <option value="烤肉">
        <option value="日料">
        <option value="韩料">
        <option value="西餐">
        <option value="粤菜">
        <option value="川菜">
        <option value="湘菜">
        <option value="卤味">
        <option value="冒菜">
        <option value="砂锅">
        <option value="铁板烧">
        <option value="寿司">
        <option value="其他">
      </datalist>
    </div>
    <div class="field">
      <label>面积</label>
      <div class="input-wrap">
        <input type="number" id="area" placeholder="例：40" min="1">
        <span class="unit">㎡</span>
      </div>
    </div>
    <div class="field">
      <label>预算</label>
      <div class="input-wrap">
        <input type="number" id="budget" placeholder="例：30000" min="100">
        <span class="unit">元</span>
      </div>
    </div>
    <button class="btn" onclick="generate()">一键配齐设备</button>
  </div>

  <div class="result" id="result"></div>
</div>

/* --- Refrigeration --- */
var REFRIGERATION_BASE = [
  {name:"四门冰箱",price:3500,priority:"P0",func:"大容量冷冻+冷藏，食材批量存储",ai:"AI通过温度监控+库存管理，预测食材效期自动预警",miss:"没冰箱食材无法存放，AI的库存管理没有数据源"},
  {name:"冷藏展示柜",price:2500,priority:"P1",func:"冷藏+展示一体，顾客可见食材新鲜度",ai:"AI摄像头分析展示柜陈列和消耗速度，自动补货建议",miss:"需要展示选品的品类没有它，AI无法感知库存消耗"}
];

/* categories that need showcase fridge */
var SHOWCASE_CATS = ["麻辣烫","火锅","烧烤","奶茶","轻食","冒菜","卤味","寿司","日料","烤鱼","烤肉","小吃","快餐","粉","粥","饺子"];

/* area scale */
function getAreaScale(area){
  if(area<=0) return {scale:1,label:"标准"};
  if(area<30) return {scale:0.7,label:"精简"};
  if(area<=60) return {scale:1,label:"标准"};
  return {scale:1.3,label:"完整"};
}

function adjustItems(items,scale){
  var arr=items.map(function(i){return Object.assign({},i)});
  if(scale>=1.3) return arr;
  if(scale<=0.7){
    var p0=arr.filter(function(i){return i.priority==="P0"});
    var p1=arr.filter(function(i){return i.priority==="P1"});
    if(p1.length>1) p1=p1.slice(0,1);
    return p0.concat(p1);
  }
  return arr;
}

/* render equipment card */
function renderCard(item,optional){
  var cls=optional?"eq-card optional":"eq-card";
  var h='<div class="'+cls+'">';
  h+='<div class="eq-head"><span class="eq-name">'+item.name+'</span><span class="eq-price">\u00a5'+item.price.toLocaleString()+'</span></div>';
  h+='<div class="eq-line eq-func"><span class="ico">\ud83d\udd0c</span><span>\u529f\u80fd\uff1a'+item.func+'</span></div>';
  h+='<div class="eq-line eq-ai"><span class="ico">\ud83e\udd16</span><span>AI\u4ef7\u503c\uff1a'+item.ai+'</span></div>';
  h+='<div class="eq-line eq-miss"><span class="ico">\u274c</span><span>\u6ca1\u6709\u5b83\uff1a'+item.miss+'</span></div>';
  h+='</div>';
  return h;
}

function generate(){
  var cat=document.getElementById("category").value.trim();
  var area=parseFloat(document.getElementById("area").value)||0;
  var budget=parseFloat(document.getElementById("budget").value)||0;

  if(!cat){alert("请选择或输入品类");return}
  if(area<=0){alert("请输入店铺面积");return}
  if(budget<=0){alert("请输入预算金额");return}

  var sc=getAreaScale(area);
  var scale=sc.scale;

  /* 1. base equipment */
  var commonItems=adjustItems(COMMON_BASE,scale);
  var specRaw=SPECIAL[cat]||SPECIAL["其他"];
  var specItems=adjustItems(specRaw,scale);
  var baseItems=commonItems.concat(specItems);

  /* 2. digital equipment (always same) */
  var digitalItems=DIGITAL.map(function(i){return Object.assign({},i)});

  /* 3. refrigeration */
  var fridgeItems=adjustItems(REFRIGERATION_BASE,scale);
  if(SHOWCASE_CATS.indexOf(cat)===-1){
    fridgeItems=fridgeItems.filter(function(i){return i.name.indexOf("展示柜")===-1});
  }

  /* merge all for budget calc */
  var allP0=baseItems.filter(function(i){return i.priority==="P0"})
    .concat(digitalItems.filter(function(i){return i.priority==="P0"}))
    .concat(fridgeItems.filter(function(i){return i.priority==="P0"}));
  var allP1=baseItems.filter(function(i){return i.priority==="P1"})
    .concat(digitalItems.filter(function(i){return i.priority==="P1"}))
    .concat(fridgeItems.filter(function(i){return i.priority==="P1"}));

  var totalP0=allP0.reduce(function(s,i){return s+i.price},0);
  var totalP1=allP1.reduce(function(s,i){return s+i.price},0);
  var totalAll=totalP0+totalP1;

  var overBudget=totalAll>budget;
  var requiredTotal=overBudget?totalP0:totalAll;
  var optionalItems=overBudget?allP1:[];

  /* budget bar */
  var pct=Math.min(Math.round(requiredTotal/budget*100),150);
  var barClass=pct>=100?"bar-red":pct>=80?"bar-yellow":"bar-green";
  var barColor=barClass==="bar-red"?"#ef4444":barClass==="bar-yellow"?"#eab308":"#22c55e";

  /* build HTML */
  var html='';

  /* AI banner */
  html+='<div class="ai-banner">';
  html+='<div class="ai-banner-title">\ud83d\udcf1 AI店长的感知层</div>';
  html+='<div class="ai-banner-desc">这些设备不是简单的厨房工具，而是AI店长的眼睛、耳朵和神经——没有它们，AI看不见后厨、算不了成本、管不了库存。每一台设备都是AI感知世界的一个器官。</div>';
  html+='</div>';

  /* summary card */
  html+='<div class="card">';
  html+='<div class="summary-row"><span class="summary-label">预算</span><span class="summary-val">\u00a5'+budget.toLocaleString()+'</span></div>';
  html+='<div class="budget-info"><span class="total">已配 \u00a5'+requiredTotal.toLocaleString()+'</span><span class="spent" style="color:'+barColor+'">'+Math.round(requiredTotal/budget*100)+'%</span></div>';
  html+='<div class="bar-bg"><div class="bar-fill '+barClass+'" style="width:'+Math.min(pct,100)+'%"></div></div>';
  if(overBudget){
    html+='<span class="over-tag">超预算 \u00a5'+(totalAll-budget).toLocaleString()+'</span>';
    html+='<div class="budget-note" style="color:#ef4444">已拆分为"AI必需 P0"和"AI增强 P1"，优先保障AI的基本感知能力</div>';
  }else if(pct>=80){
    html+='<div class="budget-note" style="color:#eab308">预算较紧凑，已优先保障AI必需设备</div>';
  }else{
    html+='<div class="budget-note" style="color:#22c55e">预算充足，建议配齐P1让AI感知更完整</div>';
  }
  html+='</div>';

  /* section 1: base equipment */
  html+='<div class="card">';
  html+='<div class="section-title">\ud83d\udd27 基础设备 <span class="tag tag-req">'+cat+'·品类必需</span></div>';
  var baseP0=baseItems.filter(function(i){return i.priority==="P0"});
  var baseP1=baseItems.filter(function(i){return i.priority==="P1"});
  if(overBudget){
    baseP0.forEach(function(i){html+=renderCard(i,false)});
  }else{
    baseP0.forEach(function(i){html+=renderCard(i,false)});
    baseP1.forEach(function(i){html+=renderCard(i,false)});
  }
  html+='</div>';

  /* section 2: digital - AI perception */
  html+='<div class="card">';
  html+='<div class="section-title">\ud83e\udde0 数字化感知设备 <span class="tag tag-p0">AI感知层·通用</span></div>';
  var digP0=digitalItems.filter(function(i){return i.priority==="P0"});
  var digP1=digitalItems.filter(function(i){return i.priority==="P1"});
  if(overBudget){
    digP0.forEach(function(i){html+=renderCard(i,false)});
  }else{
    digP0.forEach(function(i){html+=renderCard(i,false)});
    digP1.forEach(function(i){html+=renderCard(i,false)});
  }
  html+='</div>';

  /* section 3: refrigeration */
  html+='<div class="card">';
  html+='<div class="section-title">\u2744\ufe0f 制冷设备 <span class="tag tag-req">食材保鲜</span></div>';
  var friP0=fridgeItems.filter(function(i){return i.priority==="P0"});
  var friP1=fridgeItems.filter(function(i){return i.priority==="P1"});
  if(overBudget){
    friP0.forEach(function(i){html+=renderCard(i,false)});
  }else{
    friP0.forEach(function(i){html+=renderCard(i,false)});
    friP1.forEach(function(i){html+=renderCard(i,false)});
  }
  html+='</div>';

  /* optional upgrade (only when over budget) */
  if(overBudget && optionalItems.length){
    var optTotal=optionalItems.reduce(function(s,i){return s+i.price},0);
    html+='<div class="card">';
    html+='<div class="section-title">\u2b06\ufe0f AI增强 P1 <span class="tag tag-opt">预算充足再加</span></div>';
    optionalItems.forEach(function(i){html+=renderCard(i,true)});
    html+='<div style="font-size:.75rem;color:#94a3b8;margin-top:8px">以上合计 \u00a5'+optTotal.toLocaleString()+'</div>';
    html+='<div style="font-size:.75rem;color:#eab308;margin-top:4px">P1设备让AI感知更完整——前厅摄像头看客流、保温台追品质、压面机提效率</div>';
    html+='</div>';
  }

  /* tips */
  html+='<div class="card"><div class="section-title">\ud83d\udca1 配置建议</div><ul class="tips">';
  var tips=generateTips(cat,area,scale,budget,totalAll);
  tips.forEach(function(t){html+='<li>'+t+'</li>'});
  html+='</ul></div>';

  /* channels */
  var channels;
  if(budget<15000) channels=["1688批发","拼多多商用","闲鱼二手设备"];
  else if(budget<40000) channels=["京东商用","美团快驴","1688旗舰店"];
  else channels=["品牌直营","京东商用","厨都汇","本地供应商"];
  html+='<div class="card"><div class="section-title">\ud83d\uded2 推荐渠道</div><div class="channels">';
  channels.forEach(function(c){html+='<span class="chip">'+c+'</span>'});
  html+='</div></div>';

  var res=document.getElementById("result");
  res.innerHTML=html;
  res.classList.add("show");
  res.scrollIntoView({behavior:"smooth",block:"start"});
}

function generateTips(cat,area,scale,budget,total){
  var tips=[];
  if(scale<1) tips.push("面积较小，已精简设备数量，但数字化感知设备不建议省——小店的AI化反而更重要");
  if(scale>=1.3) tips.push("空间充裕，建议按动线合理分区，AI可基于摄像头数据持续优化动线效率");
  if(budget<15000) tips.push("预算有限，基础设备可在1688采购，但数字化设备建议买新的——传感器精度直接影响AI数据质量");
  if(budget>=40000) tips.push("预算充足，建议配齐P1设备让AI感知层完整——前厅摄像头+保温台+品类增强设备全上");
  tips.push("数字化设备总价仅¥1,979（P0全配），这是让AI能工作的最低成本");
  tips.push("路由器和边缘网关是最容易被忽略但最致命的设备——没网络=AI瘫痪");
  tips.push("摄像头务必选支持RTSP实时流的型号，截图模式的摄像头AI做不了实时分析");
  if(["奶茶","轻食","寿司","日料"].indexOf(cat)!==-1) tips.push(cat+"品类对冷藏依赖大，AI通过温度监控可提前预警食材变质风险");
  if(["烧烤","火锅","烤肉","铁板烧"].indexOf(cat)!==-1) tips.push(cat+"品类油烟大，排烟净化器+AI监控=合规保障，AI可检测净化器是否正常运行");
  return tips;
}
})();
