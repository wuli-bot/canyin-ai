<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备维护管理 - 餐饮AI店长</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 24px;
}
.container { max-width: 1400px; margin: 0 auto; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #f97316; }
.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }

/* 统计卡片 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  border: 1px solid #334155;
  transition: transform 0.2s;
}
.stat-card:hover { transform: translateY(-2px); }
.stat-card .number { font-size: 36px; font-weight: 700; }
.stat-card .label { color: #94a3b8; font-size: 13px; margin-top: 4px; }
.stat-card.running .number { color: #10b981; }
.stat-card.maintenance .number { color: #f59e0b; }
.stat-card.broken .number { color: #ef4444; }
.stat-card.retired .number { color: #64748b; }
.stat-card.total .number { color: #f97316; }

/* 双栏布局 */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 24px;
}
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

.panel {
  background: #1e293b;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid #334155;
}
.panel-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title .icon { font-size: 20px; }

/* 设备卡片 */
.equipment-list { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; }
.equip-card {
  background: #0f172a;
  border-radius: 8px;
  padding: 14px;
  border: 1px solid #334155;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.equip-card.breakdown-warning { border-color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.2); }
.equip-info h3 { font-size: 15px; margin-bottom: 4px; }
.equip-info p { font-size: 12px; color: #94a3b8; }
.equip-info .meta { display: flex; gap: 12px; margin-top: 6px; }
.equip-info .meta span { font-size: 11px; }

/* 状态标签 */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}
.badge.running { background: rgba(16,185,129,0.15); color: #10b981; }
.badge.maintenance { background: rgba(245,158,11,0.15); color: #f59e0b; }
.badge.broken { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge.retired { background: rgba(100,116,139,0.15); color: #64748b; }
.badge.warranty-in { background: rgba(16,185,129,0.15); color: #10b981; }
.badge.warranty-out { background: rgba(239,68,68,0.15); color: #ef4444; }
.badge.warranty-soon { background: rgba(245,158,11,0.15); color: #f59e0b; }

/* 时间线 */
.timeline { max-height: 500px; overflow-y: auto; }
.timeline-item {
  position: relative;
  padding: 12px 0 12px 24px;
  border-left: 2px solid #334155;
}
.timeline-item:last-child { border-left-color: transparent; }
.timeline-item::before {
  content: '';
  position: absolute;
  left: -5px;
  top: 16px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f97316;
}
.timeline-item.breakdown::before { background: #ef4444; }
.timeline-item.inspection::before { background: #3b82f6; }
.timeline-date { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.timeline-content { font-size: 13px; }
.timeline-cost { font-size: 12px; color: #f59e0b; margin-top: 2px; }

/* 日历视图 */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.calendar-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}
.calendar-header span {
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
  padding: 4px;
}
.calendar-day {
  text-align: center;
  padding: 8px 4px;
  border-radius: 6px;
  font-size: 12px;
  background: #0f172a;
  position: relative;
}
.calendar-day.has-maintenance {
  background: rgba(249,115,22,0.15);
  color: #f97316;
  font-weight: 600;
}
.calendar-day.today {
  border: 1px solid #f97316;
}
.calendar-day .dot {
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: #f97316;
}

/* 预警面板 */
.alert-panel {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
}
.alert-panel h3 {
  color: #ef4444;
  font-size: 16px;
  margin-bottom: 12px;
}
.alert-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: rgba(15,23,42,0.6);
  border-radius: 8px;
  margin-bottom: 8px;
}
.alert-item:last-child { margin-bottom: 0; }

/* 飞书消息预览 */
.feishu-preview {
  background: #0f172a;
  border-radius: 8px;
  padding: 16px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  color: #94a3b8;
  max-height: 300px;
  overflow-y: auto;
}

/* 全宽面板 */
.full-width { margin-bottom: 24px; }

/* 滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>

const breakdownEquipIds = ['3', '8'];

// ──────────────────────────────────────────────
// 渲染函数
// ──────────────────────────────────────────────
function renderStats() {
  const stats = { total: equipmentData.length, running: 0, maintenance: 0, broken: 0, retired: 0 };
  equipmentData.forEach(e => stats[e.status]++);
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = `
    <div class="stat-card total"><div class="number">${stats.total}</div><div class="label">设备总数</div></div>
    <div class="stat-card running"><div class="number">${stats.running}</div><div class="label">运行中</div></div>
    <div class="stat-card maintenance"><div class="number">${stats.maintenance}</div><div class="label">维修中</div></div>
    <div class="stat-card broken"><div class="number">${stats.broken}</div><div class="label">故障</div></div>
    <div class="stat-card retired"><div class="number">${stats.retired}</div><div class="label">已报废</div></div>

function renderEquipment() {
  const list = document.getElementById('equipmentList');
  list.innerHTML = equipmentData.filter(e => e.status !== 'retired').map(e => {
    const isBreakdownWarning = breakdownEquipIds.includes(e.id);
    const warrantyStatus = getWarrantyBadge(e.warranty_end);
    const nmDate = e.next_maintenance ? new Date(e.next_maintenance) : null;
    const daysUntil = nmDate ? Math.ceil((nmDate - today)/(86400000)) : null;
    const maintInfo = daysUntil !== null ?
      (daysUntil < 0 ? `<span style="color:#ef4444">⚠️ 已逾期${Math.abs(daysUntil)}天</span>` :
       daysUntil <= 7 ? `<span style="color:#f59e0b">剩余${daysUntil}天</span>` :
       `<span style="color:#94a3b8">剩余${daysUntil}天</span>`) : '';
    return `
      <div class="equip-card ${isBreakdownWarning ? 'breakdown-warning' : ''}">
        <div class="equip-info">
          <h3>${e.name}</h3>
          <p>${e.model} · ${e.location}</p>
          <div class="meta">
            ${maintInfo ? `<span>🔧 ${maintInfo}</span>` : ''}
            <span>${warrantyStatus}</span>
            ${isBreakdownWarning ? '<span style="color:#ef4444">🚨 故障频发</span>' : ''}
          </div>
        </div>
        <span class="badge ${e.status}">${statusLabel(e.status)}</span>

}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = maintenanceLogs
    .sort((a,b) => new Date(b.log_date) - new Date(a.log_date))
    .map(l => {
      const eq = equipmentData.find(e => e.id === l.equipment_id);
      return `
        <div class="timeline-item ${l.log_type}">
          <div class="timeline-date">${l.log_date} · ${eq ? eq.name : ''} · ${logTypeLabel(l.log_type)}</div>
          <div class="timeline-content">${l.description}</div>
          ${l.cost > 0 ? `<div class="timeline-cost">费用：¥${l.cost}</div>` : ''}
          ${l.technician ? `<div style="font-size:12px;color:#64748b;margin-top:2px">技术员：${l.technician}</div>` : ''}
        </div>`;
    }).join('');
}

function renderCalendar() {
  const header = document.getElementById('calendarHeader');
  const cal = document.getElementById('calendar');
  const days = ['日','一','二','三','四','五','六'];
  header.innerHTML = days.map(d => `<span>${d}</span>`).join('');

  const year = today.getFullYear(), month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  // 找本月有保养的日期
  const maintDays = new Set();
  equipmentData.forEach(e => {
    if (e.next_maintenance) {
      const d = new Date(e.next_maintenance);
      if (d.getMonth() === month && d.getFullYear() === year) {
        maintDays.add(d.getDate());
      }
    }
  });

  let html = '';
  for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate();
    const hasMaint = maintDays.has(d);
    html += `<div class="calendar-day ${isToday?'today':''} ${hasMaint?'has-maintenance':''}">
      ${d}${hasMaint ? '<div class="dot"></div>' : ''}
    </div>`;
  }
  cal.innerHTML = html;
}

function renderWarranty() {
  const list = document.getElementById('warrantyList');
  list.innerHTML = equipmentData.filter(e => e.warranty_end && e.status !== 'retired').map(e => {
    const weDate = new Date(e.warranty_end);
    const daysLeft = Math.ceil((weDate - today)/86400000);
    let badge, info;
    if (daysLeft < 0) {
      badge = '<span class="badge warranty-out">已过保</span>';
      info = `<span style="color:#ef4444">已过保${Math.abs(daysLeft)}天</span>`;
    } else if (daysLeft <= 90) {
      badge = '<span class="badge warranty-soon">即将到期</span>';
      info = `<span style="color:#f59e0b">剩余${daysLeft}天</span>`;
    } else {
      badge = '<span class="badge warranty-in">保修中</span>';
      info = `<span style="color:#10b981">剩余${daysLeft}天</span>`;
    }
    return `
      <div class="equip-card">
        <div class="equip-info">
          <h3>${e.name}</h3>
          <div class="meta"><span>🛡️ ${e.warranty_end}</span><span>${info}</span></div>
        </div>
        ${badge}
      </div>`;
  }).join('');
}

function renderAlerts() {
  const panel = document.getElementById('alertPanel');
  const list = document.getElementById('alertList');
  const alerts = [];

  // 故障频发
  breakdownEquipIds.forEach(id => {
    const eq = equipmentData.find(e => e.id === id);
    if (eq) {
      const logs = maintenanceLogs.filter(l => l.equipment_id === id && l.log_type === 'breakdown');
      const cost = logs.reduce((s,l) => s + l.cost, 0);
      alerts.push(`
        <div class="alert-item">
          <div>
            <strong>${eq.name}</strong>
            <span style="color:#94a3b8;font-size:13px"> · 3个月内${logs.length}次故障 · 累计维修¥${cost}</span>
          </div>
          <span class="badge broken">建议更换</span>
        </div>`);
    }
  });

  if (alerts.length) {
    panel.style.display = 'block';
    list.innerHTML = alerts.join('');
  }
}

function renderFeishu() {
  const preview = document.getElementById('feishuPreview');
  const todayStr = fmt(today);
  let msg = `📋 餐饮AI店长 - 设备维护日报（${todayStr}）\n${'='.repeat(40)}\n\n`;

  // 保养到期
  const upcoming = equipmentData.filter(e => {
    if (!e.next_maintenance || e.status === 'retired') return false;
    const d = new Date(e.next_maintenance);
    return (d - today) <= 7*86400000;
  }).sort((a,b) => new Date(a.next_maintenance) - new Date(b.next_maintenance));

  if (upcoming.length) {
    msg += '🔧 【保养到期提醒】\n';
    upcoming.forEach(e => {
      const d = new Date(e.next_maintenance);
      const days = Math.ceil((d-today)/86400000);
      const st = days < 0 ? '⚠️ 已逾期' : `剩余${days}天`;
      msg += `  • ${e.name}（${e.location}）- ${st}\n`;
    });
    msg += '\n';
  }

  // 故障频发
  if (breakdownEquipIds.length) {
    msg += '🚨 【故障频发预警】以下设备建议更换：\n';
    breakdownEquipIds.forEach(id => {
      const eq = equipmentData.find(e => e.id === id);
      if (eq) msg += `  • ${eq.name} - 3个月内多次故障，建议更换\n`;
    });
    msg += '\n';
  }

  // 保修
  const expiring = equipmentData.filter(e => {
    if (!e.warranty_end || e.status === 'retired') return false;
    const d = new Date(e.warranty_end);
    const days = Math.ceil((d-today)/86400000);
    return days >= 0 && days <= 30;
  });
  if (expiring.length) {
    msg += '⏰ 【保修即将到期】\n';
    expiring.forEach(e => {
      const d = new Date(e.warranty_end);
      const days = Math.ceil((d-today)/86400000);
      msg += `  • ${e.name} - 保修剩余${days}天（至${e.warranty_end}）\n`;
    });
  }

  preview.textContent = msg;
}

// ──────────────────────────────────────────────
// 工具函数
// ──────────────────────────────────────────────
function statusLabel(s) {
  return { running:'运行中', maintenance:'维修中', broken:'故障', retired:'已报废' }[s] || s;
}
function logTypeLabel(t) {
  return { maintenance:'🔧 保养', breakdown:'🔴 故障', inspection:'🔵 巡检' }[t] || t;
}
function getWarrantyBadge(end) {
  if (!end) return '';
  const d = new Date(end);
  const days = Math.ceil((d-today)/86400000);
  if (days < 0) return '<span class="badge warranty-out">已过保</span>';
  if (days <= 90) return '<span class="badge warranty-soon">即将到期</span>';
  return '<span class="badge warranty-in">保修中</span>';
}

// 初始化
// ──────────────────────────────────────────────
renderStats();
renderEquipment();
renderTimeline();
renderCalendar();
renderWarranty();
renderAlerts();
renderFeishu();
</script>
