<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备选型助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;min-height:100vh;display:flex;justify-content:center;padding:20px 12px 40px}
.app{width:100%;max-width:520px}
h1{font-size:1.5rem;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;font-size:.85rem;color:#94a3b8;margin-bottom:24px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px}
label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:6px;font-weight:500}
input[type=text],input[type=number]{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#fbbf24}
.field{margin-bottom:14px}
.field:last-of-type{margin-bottom:0}
.input-wrap{position:relative}
.input-wrap .unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#64748b;font-size:.85rem;pointer-events:none}
.btn{width:100%;padding:14px;border:none;border-radius:50px;background:linear-gradient(135deg,#fbbf24,#f97316);color:#0f172a;font-size:1rem;font-weight:700;cursor:pointer;margin-top:18px;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.result{display:none}
.result.show{display:block}
.intro-box{background:linear-gradient(135deg,#fbbf2410,#f9731610);border:1px solid #fbbf2440;border-radius:16px;padding:20px;margin-bottom:16px}
.intro-title{font-size:.9rem;color:#fbbf24;font-weight:600;margin-bottom:8px}
.intro-content{font-size:.8rem;color:#94a3b8;line-height:1.8}
.summary{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #fbbf24}
.summary-title{font-size:.9rem;color:#fbbf24;margin-bottom:12px;font-weight:600}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.summary-item{text-align:center}
.summary-value{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.summary-label{font-size:.75rem;color:#94a3b8;margin-top:2px}
.budget-bar-wrap{margin:16px 0 8px}
.budget-info{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px}
.budget-info .total{color:#94a3b8}
.budget-info .spent{font-weight:700}
.bar-bg{height:8px;background:#334155;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.section{margin-top:24px}
.section-title{font-size:1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title .icon{font-size:1.2rem}
.device-card{background:#0f172a;border-radius:12px;padding:16px;margin-bottom:12px;border-left:3px solid #f97316}
.device-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.device-name{font-size:.95rem;font-weight:600;color:#e2e8f0}
.device-price{font-size:1rem;font-weight:700;color:#fbbf24}
.device-desc{font-size:.8rem;color:#94a3b8;line-height:1.6}
.device-desc .emoji{margin-right:4px}
.device-desc .ai-value{color:#10b981;margin-top:4px}
.device-desc .no-device{color:#ef4444;margin-top:4px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600;margin-left:8px}
.tag-p0{background:#dc262620;color:#dc2626}
.warning{background:#ef444420;border:1px solid #ef444440;border-radius:12px;padding:16px;margin-top:16px}
.warning-text{font-size:.8rem;color:#ef4444;line-height:1.6}
.channel-box{background:#1e293b;border-radius:12px;padding:16px;margin-top:16px}
.channel-title{font-size:.85rem;color:#e2e8f0;font-weight:600;margin-bottom:8px}
.channel-list{display:flex;flex-wrap:wrap;gap:8px}
.channel-tag{background:#334155;padding:6px 12px;border-radius:20px;font-size:.75rem;color:#e2e8f0}
</style>
</head>
<body>
<div class="app">
  <h1>🔧 设备选型助手</h1>
  <p class="subtitle">AI店长的感知层——让AI看得见、听得到、算得准</p>
  
  <div class="card">
    <div class="field">
      <label>品类</label>
      <input type="text" id="category" list="category_list" placeholder="如：炒饭、奶茶、烧烤..." autocomplete="off">
      <datalist id="category_list">
        <option value="炒饭"><option value="盖码饭"><option value="面条"><option value="粉"><option value="麻辣烫"><option value="火锅"><option value="烧烤"><option value="炸鸡"><option value="奶茶"><option value="咖啡"><option value="轻食"><option value="汉堡"><option value="披萨"><option value="甜品"><option value="小吃"><option value="快餐"><option value="粥"><option value="饺子"><option value="包子"><option value="烤鱼"><option value="烤肉"><option value="日料"><option value="韩料"><option value="西餐"><option value="粤菜"><option value="川菜"><option value="湘菜"><option value="卤味"><option value="冒菜"><option value="砂锅"><option value="铁板烧"><option value="寿司"><option value="黄焖鸡"><option value="烤肉饭"><option value="鸡公煲"><option value="酸菜鱼"><option value="螺蛳粉"><option value="肠粉"><option value="煎饼"><option value="其他">
      </datalist>
    </div>
    <div class="field">
      <label>面积</label>
      <div class="input-wrap">
        <input type="number" id="area" placeholder="如：20" min="1">
        <span class="unit">㎡</span>
      </div>
    </div>
    <div class="field">
      <label>预算</label>
      <div class="input-wrap">
        <input type="number" id="budget" placeholder="如：10000" min="0">
        <span class="unit">元</span>
      </div>
    </div>
  </div>
  
  <button class="btn" onclick="generate()">一键配齐设备</button>
  
  <div class="result" id="result">
    <div id="summary"></div>
    <div class="section" id="p0Section"></div>
    <div class="section" id="p1Section"></div>
    <div id="channelBox"></div>
  </div>
</div>

<script>
const AI_DEVICES = [
  {name:"外卖云打印机（飞鹅FP-V3）", price:269, func:"自动接单打印，来单2秒出纸，WiFi+4G双网", aiValue:"API让AI分析销量/高峰/复购，是AI获取订单数据的入口", noDevice:"AI看不到订单数据，不知道卖什么、什么时候卖"},
  {name:"扫码枪（科密TE530D）", price:341, func:"无线扫码入库，IP66工业级防护，2万条离线存储", aiValue:"入库数据自动进系统，AI自动核算成本、记录台账", noDevice:"库存数据靠手动录入，效率低+出错率高，AI算不了成本"},
  {name:"电子秤（大华RS232）", price:300, func:"称重数据通过RS232串口实时传到系统", aiValue:"称重即入库，成本自动核算，不用手动记账", noDevice:"没有数据输出的秤，在AI运营体系里就是一块铁"},
  {name:"摄像头-后厨（海康4MP）", price:400, func:"RTSP实时视频流，AI可做食安分析", aiValue:"7×24监控，异常自动预警，食安合规有保障", noDevice:"截图模式4秒间隔，AI是瞎子，食安监控有漏洞"},
  {name:"摄像头-前厅（海康200万）", price:340, func:"RTSP实时视频流，认人+安防", aiValue:"老板认人系统、客流分析的数据源", noDevice:"前厅是盲区，客流数据、顾客画像无从谈起"},
  {name:"边缘网关（树莓派Zero 2W）", price:200, func:"本地串口秤+扫码枪+摄像头→数据推送云端", aiValue:"打通硬件和云端管道的桥梁，没有它所有本地设备全断连云端", noDevice:"云服务器没有串口/USB口，所有本地硬件都是孤岛"},
  {name:"路由器（小米AX3000T）", price:129, func:"WiFi6网络底座，所有设备联网", aiValue:"AI基础设施，网络不稳=全部设备离线=AI瘫痪", noDevice:"网络不稳→设备掉线→AI瞎了聋了哑了"}
];

const KITCHEN_DEVICES = {
  "炒饭":[{name:"商用炒灶",price:2800,func:"猛火快炒，炒饭出餐核心设备"},{name:"大铁锅",price:200,func:"炒制容器"},{name:"蒸饭柜",price:3500,func:"批量蒸饭，保证出餐速度"},{name:"保温台",price:1500,func:"成品保温，保证出餐温度"}],
  "盖码饭":[{name:"商用炒灶",price:2800,func:"猛火快炒"},{name:"大铁锅",price:200,func:"炒制容器"},{name:"蒸饭柜",price:3500,func:"批量蒸饭"},{name:"保温台",price:1500,func:"成品保温"}],
  "面条":[{name:"商用炒灶",price:2800,func:"炒菜浇头"},{name:"煮面炉",price:2000,func:"多眼煮面，高效出餐"},{name:"高汤桶",price:500,func:"熬制汤底"},{name:"蒸饭柜",price:3500,func:"蒸饭备餐"}],
  "粉":[{name:"煮面炉",price:2000,func:"烫粉煮粉"},{name:"高汤桶",price:500,func:"熬制汤底"},{name:"烫粉炉",price:1500,func:"专业烫粉设备"},{name:"保温台",price:1500,func:"成品保温"}],
  "麻辣烫":[{name:"煮面炉",price:2000,func:"烫菜煮串"},{name:"展示冷柜",price:2800,func:"食材展示保鲜"},{name:"烫菜篮架",price:300,func:"分类烫菜"},{name:"调料台",price:1000,func:"调料配置"}],
  "火锅":[{name:"电磁炉 ×5",price:2000,func:"桌边加热"},{name:"涮菜展示柜",price:3000,func:"食材展示保鲜"},{name:"调料台",price:1000,func:"自助调料"},{name:"电磁炉专用锅 ×5",price:750,func:"火锅锅具"}],
  "烧烤":[{name:"烧烤炉",price:3000,func:"烤制核心设备"},{name:"排烟净化器",price:4000,func:"油烟净化，合规必备"},{name:"冷藏展示柜",price:3500,func:"食材保鲜展示"},{name:"保鲜工作台",price:2500,func:"备料操作台"}],
  "炸鸡":[{name:"炸炉",price:3500,func:"油炸核心设备"},{name:"保温柜",price:2000,func:"成品保温"},{name:"裹粉台",price:800,func:"裹粉操作"},{name:"腌制机",price:1200,func:"腌制入味"}],
  "奶茶":[{name:"封口机",price:1800,func:"杯口封口"},{name:"制冰机",price:2500,func:"制冰设备"},{name:"搅拌机",price:800,func:"搅拌混合"},{name:"奶精机",price:1200,func:"奶精分配"}],
  "咖啡":[{name:"半自动咖啡机",price:8000,func:"萃取浓缩"},{name:"磨豆机",price:2000,func:"研磨咖啡豆"},{name:"制冰机",price:2500,func:"制冰设备"},{name:"奶泡机",price:800,func:"打奶泡"}],
  "轻食":[{name:"沙拉操作台",price:2500,func:"沙拉制作台"},{name:"冷藏展示柜",price:3500,func:"食材保鲜展示"},{name:"商用搅拌机",price:1200,func:"制作酱汁"},{name:"保鲜工作台",price:2500,func:"备料操作台"}],
  "汉堡":[{name:"扒炉",price:3000,func:"煎肉饼"},{name:"炸炉",price:3500,func:"炸薯条等"},{name:"汉堡包装机",price:1500,func:"包装汉堡"},{name:"保温柜",price:2000,func:"成品保温"}],
  "卤味":[{name:"卤锅",price:800,func:"卤制容器"},{name:"保温展示柜",price:2500,func:"成品保温展示"},{name:"切配台",price:1200,func:"切配操作"},{name:"冷藏柜",price:3000,func:"食材保鲜"}],
  "日料":[{name:"寿司操作台",price:2000,func:"寿司制作"},{name:"冷藏展示柜",price:3500,func:"食材保鲜"},{name:"刺身刀具套装",price:1500,func:"专业刀具"},{name:"制冰机",price:2500,func:"制冰设备"}],
  "川菜":[{name:"商用炒灶",price:2800,func:"猛火快炒"},{name:"大铁锅",price:200,func:"炒制容器"},{name:"蒸饭柜",price:3500,func:"批量蒸饭"},{name:"保温台",price:1500,func:"成品保温"}]
};
KITCHEN_DEVICES["其他"] = KITCHEN_DEVICES["炒饭"];

const REFRIGERATION = [{name:"四门冰箱",price:3500,func:"冷冻+冷藏分区存储"},{name:"冷藏展示柜",price:2500,func:"食材展示保鲜"}];

function generate(){
  const cat = document.getElementById("category").value;
  const area = parseFloat(document.getElementById("area").value)||0;
  const budget = parseFloat(document.getElementById("budget").value)||0;
  if(!cat){alert("请填写品类");return}
  if(!area){alert("请填写面积");return}
  if(!budget){alert("请填写预算");return}
  
  const scale = area/20;
  let kitchenDevices = KITCHEN_DEVICES[cat] || KITCHEN_DEVICES["其他"];
  if(scale<0.8) kitchenDevices = kitchenDevices.slice(0,Math.max(2,Math.ceil(kitchenDevices.length*0.7)));
  
  const needFridge = ["炒饭","盖码饭","面条","粉","奶茶","烧烤","火锅","炸鸡","麻辣烫","轻食","咖啡","汉堡","卤味","日料","川菜","其他"];
  let fridgeItems = [];
  if(needFridge.includes(cat)){
    fridgeItems = REFRIGERATION.map(d=>({...d}));
    if(scale<0.8) fridgeItems = [REFRIGERATION[0]];
  }
  
  let p0Total = AI_DEVICES.reduce((s,i)=>s+i.price,0) + kitchenDevices.reduce((s,i)=>s+i.price,0) + fridgeItems.reduce((s,i)=>s+i.price,0);
  const pct = p0Total/budget*100;
  const barColor = pct<=80?'#10b981':pct<=100?'#eab308':'#ef4444';
  
  document.getElementById("result").classList.add("show");
  document.getElementById("summary").innerHTML = `
    <div class="intro-box">
      <div class="intro-title">🤖 AI店长的感知层配置</div>
      <div class="intro-content">每个设备都让AI多一个数据来源：打印机让AI看到订单、扫码枪让AI看到库存、摄像头让AI看到现场、电子秤让AI看到成本。<br><br><b style="color:#fbbf24">没有这些设备，AI就是瞎子聋子——看不见、听不到、算不准。</b></div>
    </div>
    <div class="summary-title">💰 预算概览</div>
    <div class="summary-grid">
      <div class="summary-item"><div class="summary-value">¥${p0Total.toLocaleString()}</div><div class="summary-label">设备总价</div></div>
      <div class="summary-item"><div class="summary-value">${Math.round(pct)}%</div><div class="summary-label">预算使用率</div></div>
    </div>
    <div class="budget-bar-wrap">
      <div class="budget-info"><span class="total">预算 ¥${budget.toLocaleString()}</span><span class="spent" style="color:${barColor}">¥${p0Total.toLocaleString()}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor}"></div></div>
    </div>
    ${pct>100?`<div class="warning"><div class="warning-text">⚠️ 超预算 ¥${(p0Total-budget).toLocaleString()}，建议优先保证P0设备</div></div>`:''}
  `;
  
  let html = '<div class="section-title"><span class="icon">🤖</span>AI感知层设备 <span class="tag tag-p0">P0 · AI必需</span></div>';
  AI_DEVICES.forEach(d=>{
    html += `
      <div class="device-card">
        <div class="device-header"><span class="device-name">${d.name}</span><span class="device-price">¥${d.price.toLocaleString()}</span></div>
        <div class="device-desc">
          <div><span class="emoji">🔌</span>功能：${d.func}</div>
          <div class="ai-value"><span class="emoji">🤖</span>AI价值：${d.aiValue}</div>
          <div class="no-device"><span class="emoji">❌</span>没有它会：${d.noDevice}</div>
        </div>
      </div>`;
  });
  
  html += `<div class="section-title" style="margin-top:20px"><span class="icon">🍳</span>${cat}厨房设备 <span class="tag tag-p0">P0 · 必需</span></div>`;
  kitchenDevices.forEach(d=>{
    html += `
      <div class="device-card">
        <div class="device-header"><span class="device-name">${d.name}</span><span class="device-price">¥${d.price.toLocaleString()}</span></div>
        <div class="device-desc"><div><span class="emoji">🔌</span>功能：${d.func}</div></div>
      </div>`;
  });
  
  if(fridgeItems.length>0){
    html += '<div class="section-title" style="margin-top:20px"><span class="icon">❄️</span>制冷设备 <span class="tag tag-p0">P0 · 必需</span></div>';
    fridgeItems.forEach(d=>{
      html += `
        <div class="device-card">
          <div class="device-header"><span class="device-name">${d.name}</span><span class="device-price">¥${d.price.toLocaleString()}</span></div>
          <div class="device-desc"><div><span class="emoji">🔌</span>功能：${d.func}</div></div>
        </div>`;
    });
  }
  
  document.getElementById("p0Section").innerHTML = html;
  document.getElementById("p1Section").innerHTML = '';
  
  let channels = [];
  if(budget<8000) channels=[{name:"1688批发",desc:"价格最低"},{name:"拼多多",desc:"百亿补贴"},{name:"闲鱼二手",desc:"性价比高"}];
  else if(budget<15000) channels=[{name:"京东自营",desc:"正品+售后快"},{name:"京东商用",desc:"企业采购"},{name:"品牌官方店",desc:"官方直营"}];
  else channels=[{name:"品牌直营",desc:"厂家供货"},{name:"京东商用",desc:"企业采购"},{name:"本地经销商",desc:"售后响应快"}];
  let channelHtml='<div class="channel-box"><div class="channel-title">🛒 推荐采购渠道</div><div class="channel-list">';
  channels.forEach(c=>{channelHtml+=`<div class="channel-tag">${c.name}<br><span style="font-size:.65rem;color:#94a3b8">${c.desc}</span></div>`;});
  channelHtml+='</div></div>';
  document.getElementById("channelBox").innerHTML=channelHtml;
  document.getElementById("result").scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
