<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>菜单设计助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px}
.container{width:100%;max-width:520px}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fbbf24,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{font-size:13px;color:#94a3b8}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#94a3b8;margin-bottom:5px;font-weight:500}
.field input,.field select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 12px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:#fbbf24}
.field input::placeholder{color:#475569}
.row{display:flex;gap:12px}
.row .field{flex:1}
.btn{width:100%;padding:13px;border:none;border-radius:50px;background:linear-gradient(135deg,#fbbf24,#f97316);color:#0f172a;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.section-title{font-size:15px;font-weight:600;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.result-card{background:#0f172a;border-radius:12px;padding:14px;margin-bottom:10px;border-left:3px solid #334155}
.result-card.yl{border-left-color:#ef4444}
.result-card.ll{border-left-color:#fbbf24}
.result-card.jl{border-left-color:#22c55e}
.result-card.tc{border-left-color:#3b82f6}
.result-card.cg{border-left-color:#a855f7}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #1e293b}
.item:last-child{border-bottom:none}
.item-name{font-size:13px;font-weight:600}
.item-desc{font-size:11px;color:#64748b;margin-top:2px}
.item-price{font-size:13px;font-weight:700;color:#fbbf24;white-space:nowrap;margin-left:10px}
.tip-list{list-style:none;padding:0}
.tip-list li{font-size:12px;color:#94a3b8;padding:5px 0;border-bottom:1px solid #1e293b;line-height:1.6}
.tip-list li:last-child{border-bottom:none}
.tip-list li::before{content:"💡 ";font-size:11px}
.empty{text-align:center;padding:40px 20px;color:#475569;font-size:13px}
.history-toggle{font-size:12px;color:#64748b;text-align:center;cursor:pointer;padding:8px;transition:color .2s}
.history-toggle:hover{color:#94a3b8}
.history-item{background:#0f172a;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s}
.history-item:hover{background:#1a2332}
.history-item .hi-info{font-size:12px}
.history-item .hi-title{font-weight:600;font-size:13px}
.history-item .hi-time{font-size:11px;color:#475569;margin-top:2px}
.history-item .hi-del{color:#475569;font-size:16px;padding:4px 8px;border-radius:6px;transition:color .2s,background .2s}
.history-item .hi-del:hover{color:#ef4444;background:#1e293b}
.back-btn{font-size:12px;color:#fbbf24;cursor:pointer;margin-bottom:12px;display:inline-block}
.back-btn:hover{text-decoration:underline}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📋 菜单设计</h1>
    <p>告诉我你的店，帮你设计科学菜单</p>
  </div>

  <div id="inputView">
    <div class="card">
      <div class="field">
        <label>店名（可选，用于方案展示）</label>
        <input type="text" id="shopName" placeholder="如：老王家炒饭">
      </div>
      <div class="field">
        <label>品类</label>
        <input type="text" id="category" list="category_list" placeholder="如：炒饭、奶茶、烧烤..." autocomplete="off"><datalist id="category_list"><option value="炒饭"><option value="盖码饭"><option value="面条"><option value="粉"><option value="麻辣烫"><option value="火锅"><option value="烧烤"><option value="炸鸡"><option value="奶茶"><option value="咖啡"><option value="轻食"><option value="汉堡"><option value="披萨"><option value="甜品"><option value="小吃"><option value="快餐"><option value="粥"><option value="饺子"><option value="包子"><option value="烤鱼"><option value="烤肉"><option value="日料"><option value="韩料"><option value="西餐"><option value="粤菜"><option value="川菜"><option value="湘菜"><option value="卤味"><option value="冒菜"><option value="砂锅"><option value="铁板烧"><option value="寿司"><option value="其他"></datalist>
      </div>
      <div class="row">
        <div class="field">
          <label>客单价（元）</label>
          <input type="number" id="avgPrice" placeholder="如：25">
        </div>
        <div class="field">
          <label>菜品数量</label>
          <input type="number" id="dishCount" value="12" min="6" max="50">
        </div>
      </div>
      <button class="btn" id="genBtn" onclick="generate()">一键设计菜单</button>
    </div>

    <div id="historySection" class="hidden">
      <div class="history-toggle" onclick="toggleHistory()">▾ 查看历史方案</div>
      <div id="historyList" class="hidden"></div>
    </div>
  </div>

  <div id="resultView" class="hidden">
    <div class="back-btn" onclick="showInput()">← 返回修改</div>
    <div id="resultContent"></div>
  </div>
</div>

function rand(min, max) { return Math.round((min + Math.random() * (max - min)) * 10) / 10; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function generate() {
  var name = document.getElementById('shopName').value.trim() || '我的店';
  var cat = document.getElementById('category').value;
  var avg = parseInt(document.getElementById('avgPrice').value) || 0;
  var total = clamp(parseInt(document.getElementById('dishCount').value) || 12, 6, 50);

  if (!cat) { alert('请选择品类'); return; }
  if (avg <= 0) { alert('请输入客单价'); return; }

  var db = (MENU_DB[cat] || MENU_DB['其他']).slice();
  var addons = (ADDON_DB[cat] || ADDON_DB['其他']).slice();

  var ylCount = Math.max(2, Math.round(total * 0.2));
  var llCount = Math.max(2, Math.round(total * 0.35));
  var cgCount = Math.max(1, Math.round(total * 0.3));
  var addonCount = clamp(Math.round(total * 0.3), 3, 5);

  function pick(arr, n) {
    var shuffled = arr.slice().sort(function() { return Math.random() - 0.5; });
    return shuffled.slice(0, Math.min(n, shuffled.length));
  }

  function priceFor(baseP, cat2) {
    var ratio;
    if (cat2 === 'yl') ratio = rand(0.6, 0.8);
    else if (cat2 === 'll') ratio = rand(1.2, 1.5);
    else ratio = rand(0.9, 1.1);
    var p = baseP > 0 ? baseP : Math.round(avg * ratio);
    return Math.max(Math.round(avg * ratio), Math.round(p * ratio / (baseP > 0 ? baseP / avg * ratio : 1)));
  }

  var ylItems = pick(db, ylCount).map(function(item) {
    var p = Math.round(avg * rand(0.6, 0.8));
    return { n: item.n, p: Math.max(p, 6), c: item.c > 0 ? item.c : Math.round(p * 0.3), d: item.d };
  });
  var llItems = pick(db, llCount).map(function(item) {
    var p = Math.round(avg * rand(1.2, 1.5));
    return { n: item.n, p: p, c: item.c > 0 ? item.c : Math.round(p * 0.35), d: item.d };
  });
  var cgItems = pick(db, cgCount).map(function(item) {
    var p = Math.round(avg * rand(0.9, 1.1));
    return { n: item.n, p: Math.max(p, 8), c: item.c > 0 ? item.c : Math.round(p * 0.35), d: item.d };
  });

  var myAddons = pick(addons, addonCount).map(function(a) {
    return { n: a.n, p: a.p > 0 ? a.p : Math.round(avg * rand(0.1, 0.2)) };
  });

  var comboCount = clamp(Math.round(total * 0.2), 2, 3);
  var combos = [];
  for (var i = 0; i < comboCount; i++) {
    var yl = ylItems[i % ylItems.length];
    var ll = llItems[i % llItems.length];
    var sumP = yl.p + ll.p;
    var cp = Math.round(sumP * 0.85);
    var labels = ['超值单人餐','招牌双人餐','豪华畅享餐','人气套餐','经济实惠餐'];
    combos.push({
      n: labels[i % labels.length],
      items: yl.n + ' + ' + ll.n,
      p: cp,
      orig: sumP
    });
  }

  var tips = (TIPS_DB[cat] || TIPS_DB['其他']).slice(0, 5);

  var design = {
    id: Date.now().toString(),
    name: name,
    cat: cat,
    avg: avg,
    total: total,
    yl: ylItems,
    ll: llItems,
    cg: cgItems,
    addons: myAddons,
    combos: combos,
    tips: tips,
    time: new Date().toLocaleString('zh-CN')
  };

  saveDesign(design);
  renderResult(design);
}

function showInput() {
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('inputView').classList.remove('hidden');
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function saveDesign(design) {
  var list = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  list.unshift(design);
  if (list.length > 5) list = list.slice(0, 5);
  localStorage.setItem(DB_KEY, JSON.stringify(list));
  renderHistory();
}

function renderHistory() {
  var list = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  var section = document.getElementById('historySection');
  var container = document.getElementById('historyList');
  if (list.length === 0) { section.classList.add('hidden'); return; }
  section.classList.remove('hidden');

  var h = '';
  list.forEach(function(d) {
    h += '<div class="history-item" onclick="viewDesign(\'' + d.id + '\')">';
    h += '<div class="hi-info"><div class="hi-title">' + esc(d.name) + ' · ' + esc(d.cat) + '</div>';
    h += '<div class="hi-time">' + d.time + ' · ¥' + d.avg + ' · ' + d.total + '道</div></div>';
    h += '<div class="hi-del" onclick="event.stopPropagation();delDesign(\'' + d.id + '\')">✕</div>';
    h += '</div>';
  });
  container.innerHTML = h;
}

function viewDesign(id) {
  var list = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  var d = list.find(function(x) { return x.id === id; });
  if (d) renderResult(d);
}

function delDesign(id) {
  var list = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
  list = list.filter(function(x) { return x.id !== id; });
  localStorage.setItem(DB_KEY, JSON.stringify(list));
  renderHistory();
}

function toggleHistory() {
  var el = document.getElementById('historyList');
  el.classList.toggle('hidden');
  var toggle = document.querySelector('.history-toggle');
  if (el.classList.contains('hidden')) {
    toggle.textContent = '▾ 查看历史方案';
  } else {
    toggle.textContent = '▴ 收起历史方案';
  }
}

renderHistory();
</script>
