<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>差评处理助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px 16px;
}
.container { max-width: 520px; width: 100%; }
.header { text-align: center; margin-bottom: 28px; }
.header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
.header p { color: #94a3b8; font-size: 0.9rem; }
.card {
  background: #1e293b;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 20px;
}
label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; font-weight: 500; }
textarea {
  width: 100%;
  min-height: 150px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 12px;
  color: #e2e8f0;
  font-size: 0.95rem;
  padding: 14px 16px;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
  line-height: 1.6;
}
textarea:focus { border-color: #fbbf24; }
textarea::placeholder { color: #475569; }
.btn-generate {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #fbbf24, #f97316);
  color: #0f172a;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  margin-top: 16px;
  letter-spacing: 1px;
}
.btn-generate:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(251,191,36,0.3); }
.btn-generate:active { transform: translateY(0); }
.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
#result { display: none; }
.section-title { font-size: 1rem; font-weight: 600; margin-bottom: 14px; }
.diagnosis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.diag-item {
  background: #0f172a;
  border-radius: 10px;
  padding: 12px 10px;
  text-align: center;
}
.diag-label { font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }
.diag-value { font-size: 0.9rem; font-weight: 600; }
.reply-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
  border-left: 3px solid;
  position: relative;
}
.reply-card.a { border-left-color: #34d399; }
.reply-card.b { border-left-color: #60a5fa; }
.reply-card.c { border-left-color: #a78bfa; }
.reply-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; }
.reply-text {
  font-size: 0.88rem;
  line-height: 1.7;
  color: #cbd5e1;
  white-space: pre-wrap;
  word-break: break-all;
}
.btn-copy {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 14px;
  border: 1px solid #334155;
  border-radius: 20px;
  background: transparent;
  color: #94a3b8;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-copy:hover { border-color: #fbbf24; color: #fbbf24; }
.btn-copy.copied { border-color: #34d399; color: #34d399; }
.suggestions {
  background: #0f172a;
  border-radius: 10px;
  padding: 16px;
}
.suggestions ol { padding-left: 20px; }
.suggestions li { font-size: 0.88rem; line-height: 1.7; color: #cbd5e1; margin-bottom: 6px; }
.loading {
  text-align: center;
  padding: 40px 0;
  display: none;
}
.loading .dots span {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #fbbf24;
  margin: 0 4px;
  animation: bounce 1.2s infinite;
}
.loading .dots span:nth-child(2) { animation-delay: 0.2s; }
.loading .dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
.loading p { color: #64748b; font-size: 0.85rem; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛡️ 差评处理</h1>
    <p>粘贴差评，帮你生成专业回复</p>
  </div>

  <div class="card">
    <label>差评内容</label>
    <textarea id="review" placeholder="粘贴差评内容..."></textarea>
    <button class="btn-generate" id="btnGen" onclick="generate()">一键生成回复</button>
  </div>

  <div class="loading" id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <p>正在分析差评并生成回复...</p>
  </div>

  <div id="result">
    <div class="card">
      <div class="section-title">🔴 差评诊断</div>
      <div class="diagnosis-grid">
        <div class="diag-item">
          <div class="diag-label">类型</div>
          <div class="diag-value" id="diagType">-</div>
        </div>
        <div class="diag-item">
          <div class="diag-label">严重度</div>
          <div class="diag-value" id="diagSev">-</div>
        </div>
        <div class="diag-item">
          <div class="diag-label">恶意程度</div>
          <div class="diag-value" id="diagMal">-</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">💬 回复方案</div>
      <div class="reply-card a">
        <div class="reply-title">方案A：诚恳道歉版</div>
        <div class="reply-text" id="replyA"></div>
        <button class="btn-copy" onclick="copyText(this, 'replyA')">复制</button>
      </div>
      <div class="reply-card b">
        <div class="reply-title">方案B：解释说明版</div>
        <div class="reply-text" id="replyB"></div>
        <button class="btn-copy" onclick="copyText(this, 'replyB')">复制</button>
      </div>
      <div class="reply-card c">
        <div class="reply-title">方案C：补偿挽留版</div>
        <div class="reply-text" id="replyC"></div>
        <button class="btn-copy" onclick="copyText(this, 'replyC')">复制</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">📋 处理建议</div>
      <div class="suggestions">
        <ol id="suggList"></ol>
      </div>
    </div>
  </div>
</div>

<script>
var TEMPLATES = {
  flavor: {
    label: '口味问题',

    b: '感谢您的反馈！关于您提到的口味问题，我们非常重视。我们的菜品严格按照标准配方制作，但每位顾客的口味偏好确实有所不同。我们已经在记录您的反馈，后续会考虑增加口味可调选项（如咸淡、辣度等），以更好地满足大家的不同需求。期待您的再次光临，届时可以提前告知我们您的口味偏好。',
    c: '非常抱歉这次的用餐体验让您失望了！为了表达我们的歉意，我们想为您提供一份专属优惠：下次到店消费可享受8折优惠，并且可以免费定制您喜欢的口味。我们真心希望能有机会弥补这次的不足，期待再次为您服务。'
  },
  service: {
    label: '服务态度',
    a: '尊敬的顾客，对于您在我们店中遇到的服务态度问题，我们深表歉意！顾客的感受是我们最在意的事情，发生这样的情况我们责无旁贷。我们已对相关人员进行严肃批评和再培训，确保每一位顾客都能感受到热情周到的服务。请您原谅我们这次的疏忽，我们一定会改进。',
    b: '感谢您提出宝贵的意见！关于您反映的服务问题，我们想做个说明：当天由于用餐高峰期客流量较大，可能在服务响应上有所延迟，但这绝不是借口。我们已经在优化人员排班制度，增加高峰时段的服务力量，同时加强服务礼仪培训，力求为每位顾客提供更好的就餐体验。',
    c: '十分抱歉给您带来了不好的用餐体验！我们深知好的服务与美食同样重要。为表歉意，我们将为您准备一张VIP服务卡，下次到店可享受优先接待和专属服务员。此外本次消费我们将赠送一份精美小吃，希望能弥补您的不愉快体验。'
  },
  hygiene: {
    label: '卫生问题',
    a: '尊敬的顾客，看到您的反馈我们感到非常震惊和愧疚！食品卫生是我们的底线，出现这样的状况是我们工作的严重失职。我们已立即启动全面卫生检查，对涉事环节进行彻底整改，加强员工的卫生操作规范培训。对于给您造成的不适，我们真诚道歉，绝不再犯。',
    b: '感谢您的反馈！对于您提到的卫生情况，我们高度重视。我们店每日执行严格的清洁消毒流程，但显然在某些细节上出现了疏漏。我们已经安排了一次全面的卫生大扫除，并引入了每日三次卫生巡检制度，同时增设了食品卫生监督员岗位，确保每一个环节都达到标准。',
    c: '非常抱歉！卫生问题是我们绝对不能容忍的，出现这种情况我们深感自责。除了立即进行全面整改之外，我们愿意为您提供全额退款，并赠送一次免费用餐机会。我们真心希望您能看到我们改正的决心，给我们一个改正的机会。'
  },
  delivery: {
    label: '配送问题',
    a: '尊敬的顾客，非常抱歉配送环节给您带来了不好的体验！食物送到时状态不佳，这完全不符合我们的出品标准。我们已经与配送团队进行了紧急沟通，要求加强配送过程中的保温和防护措施。对于这次的配送问题，我们深感抱歉。',
    b: '感谢您的反馈！关于配送问题，我们想说明一下：目前我们使用的平台配送系统，在高峰期可能会出现配送延迟的情况。但食物变凉、洒漏的问题确实是我们的包装环节需要改进。我们正在升级保温包装方案，增加防洒漏密封措施，同时与配送方协调优化配送路线。',
    c: '很抱歉配送体验让您不满意！为了弥补这次的遗憾，我们想为您提供下次点餐的免费配送服务，并额外赠送一份饮品或小食。同时我们也在优化出餐到配送的衔接流程，确保食物在最佳状态下送到您手中。期待您的再次惠顾。'
  },
  value: {
    label: '性价比',
    a: '尊敬的顾客，感谢您坦诚的反馈！对于您觉得性价比不够满意，我们表示理解。我们一直致力于用优质的食材和用心的制作来回馈每一位顾客，但显然这次没能让您感受到物有所值。我们会认真反思，在菜品品质和定价之间找到更好的平衡。',
    b: '感谢您的评价！关于价格方面，我们的食材采购始终坚持品质优先，部分核心食材采用优质供应商进货，成本相对较高。不过您的反馈让我们意识到，顾客对价格的感受也很重要。我们正在考虑推出更多实惠的套餐组合，让顾客有更好的性价比体验。',
    c: '抱歉这次让您觉得不太值！您的满意是我们最大的追求。我们决定为您准备一份老顾客专属福利：下次消费可享受满100减20的优惠，同时我们正在推出全新的超值套餐系列，性价比更高。期待您再次光临，给我们展示改进的机会。'
  }
};

var SUGGESTIONS = {
  flavor: [
    '立即与后厨沟通，复核该菜品的调味标准和制作流程',
    '考虑在菜单上标注口味特点（辣度、咸淡等），降低顾客预期落差',
    '收集更多同类反馈，如频繁出现则考虑调整配方'
  ],
  service: [
    '调取监控或排班记录，确认当事员工并针对性培训',
    '建立服务评分考核机制，将顾客满意度与绩效挂钩',
    '高峰时段增加人手或设置等候安抚措施（如提供免费小食）'
  ],
  hygiene: [
    '立即进行全面卫生自查，重点检查后厨和就餐区',
    '加强员工卫生培训，落实个人卫生操作规范',
    '建立卫生巡检台账，每日记录并存档备查'
  ],
  delivery: [
    '检查现有包装方案，升级保温袋和防洒漏容器',
    '与配送平台沟通配送时效要求，必要时考虑自配送',
    '优化出餐节奏，确保骑手取餐时食物处于最佳状态'
  ],
  value: [
    '对比同商圈竞品定价，评估自身价格竞争力',
    '设计引流套餐和组合优惠，提升顾客性价比感知',
    '适当增加菜品份量或附赠小菜，提高超值感'
  ]
};

function detectType(text) {
  var keywords = {
    flavor: ['咸','淡','辣','没味','没味道','难吃','口味','味道','不好吃','腥','油腻','太甜','太咸','太淡','不新鲜','口感','太硬','太软','糊了','夹生'],
    service: ['态度','慢','不耐烦','爱理不理','冷漠','凶','吼','推脱','不理','服务差','没人管','甩脸','白眼','催','等太久','敷衍'],
    hygiene: ['头发','虫子','蟑螂','脏','不干净','异味','臭','发霉','变质','过期','油渍','污渍','苍蝇','老鼠','食物中毒','拉肚子','腹泻'],
    delivery: ['凉了','冷了','洒了','撒了','洒','溢出','破损','漏了','慢了','超时','配送','外卖','骑手','等了很久','送到就凉'],
    value: ['贵','不值','性价比','量少','分量','太贵','坑','宰人','不值这个价','价格高','涨价','不划算','物不所值','物无所值']
  };
  var scores = {};
  var types = Object.keys(keywords);
  for (var i = 0; i < types.length; i++) {
    var t = types[i];
    scores[t] = 0;
    for (var j = 0; j < keywords[t].length; j++) {
      if (text.indexOf(keywords[t][j]) !== -1) {
        scores[t]++;
      }
    }
  }
  var best = 'flavor';
  var bestScore = 0;
  for (var k = 0; k < types.length; k++) {
    if (scores[types[k]] > bestScore) {
      bestScore = scores[types[k]];
      best = types[k];
    }
  }
  return best;
}

function detectSeverity(text) {
  var len = text.length;
  var hasExclaim = /!!|！！|!!!/.test(text);
  if (len > 100 || hasExclaim) return { level: '高', stars: '⭐⭐⭐⭐⭐' };
  if (len >= 50) return { level: '中', stars: '⭐⭐⭐' };
  return { level: '低', stars: '⭐⭐' };
}

function detectMalice(text) {
  var highWords = ['举报','投诉','工商','12315','曝光','315','消协','律师','法院','媒体'];
  var midWords = ['失望','再也不','不会再','拉黑','避雷','劝退','千万别'];
  for (var i = 0; i < highWords.length; i++) {
    if (text.indexOf(highWords[i]) !== -1) return '高';
  }
  for (var j = 0; j < midWords.length; j++) {
    if (text.indexOf(midWords[j]) !== -1) return '中';
  }
  return '低';
}

function generate() {
  var text = document.getElementById('review').value.trim();
  if (!text) {
    shakeBtn();
    return;
  }
  var btn = document.getElementById('btnGen');
  var loading = document.getElementById('loading');
  var result = document.getElementById('result');
  btn.disabled = true;
  result.style.display = 'none';
  loading.style.display = 'block';

  setTimeout(function() {
    var type = detectType(text);
    var sev = detectSeverity(text);
    var mal = detectMalice(text);
    var tmpl = TEMPLATES[type];

    document.getElementById('diagType').textContent = tmpl.label;
    document.getElementById('diagSev').textContent = sev.stars;
    document.getElementById('diagMal').textContent = mal;

    document.getElementById('replyA').textContent = tmpl.a;
    document.getElementById('replyB').textContent = tmpl.b;
    document.getElementById('replyC').textContent = tmpl.c;

    var suggList = document.getElementById('suggList');
    suggList.innerHTML = '';
    var suggs = SUGGESTIONS[type];
    for (var i = 0; i < suggs.length; i++) {
      var li = document.createElement('li');
      li.textContent = suggs[i];
      suggList.appendChild(li);
    }

    loading.style.display = 'none';
    result.style.display = 'block';
    btn.disabled = false;
  }, 1200);
}

function shakeBtn() {
  var btn = document.getElementById('btnGen');
  btn.style.animation = 'shake 0.4s';
  setTimeout(function() { btn.style.animation = ''; }, 400);
}

function copyText(btn, id) {
  var text = document.getElementById(id).textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showCopied(btn);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  }
}

function showCopied(btn) {
  btn.textContent = '已复制 ✓';
  btn.classList.add('copied');
  setTimeout(function() {
    btn.textContent = '复制';
    btn.classList.remove('copied');
  }, 2000);
}

var shakeStyle = document.createElement('style');
shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
document.head.appendChild(shakeStyle);
</script>
</body>
</html>
