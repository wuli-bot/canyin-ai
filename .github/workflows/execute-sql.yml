name: Execute Supabase SQL

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'SQL文件路径'
        required: true
        default: 'settlement_schema.sql'

jobs:
  execute-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Execute SQL
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Executing ${{ inputs.sql_file }} ==="
          psql "host=db.vovzgflfdwngfuqnxjc.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" -f ${{ inputs.sql_file }} -v ON_ERROR_STOP=1
          echo "=== SQL executed successfully! ==="

      - name: Verify tables
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "=== Verifying agent_auth table ==="
          psql "host=db.vovzgflfdwngfuqnxjc.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" -c "SELECT agent_id, agent_name, status, single_limit, daily_limit FROM agent_auth ORDER BY agent_name;"
          echo ""
          echo "=== Verifying settlement_records table ==="
          psql "host=db.vovzgflfdwngfuqnxjc.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" -c "SELECT count(*) as total_records FROM settlement_records;"
          psql "host=db.vovzgflfdwngfuqnxjc.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" -c "SELECT agent_name, type, amount, status, description FROM settlement_records ORDER BY created_at DESC LIMIT 10;"
          echo ""
          echo "=== Total public tables ==="
          psql "host=db.vovzgflfdwngfuqnxjc.supabase.co port=5432 dbname=postgres user=postgres sslmode=require" -c "SELECT count(*) as table_count FROM pg_tables WHERE schemaname='public';"
          echo "=== Verification complete! ==="
