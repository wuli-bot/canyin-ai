<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">AI助手对话</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;
  --blue:#4f8cff;--purple:#a855f7;--gold:#fbbf24;--cyan:#06b6d4;
  --text:#e4e4e7;--text-dim:#9ca3af;--text-bright:#fff;
  --green:#22c55e;--red:#ef4444;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  min-height:100vh;display:flex;flex-direction:column;
}
/* Header */
.chat-header{
  background:rgba(15,17,23,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:.8rem 1.2rem;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;
}
.chat-header-avatar{
  width:40px;height:40px;border-radius:10px;object-fit:cover;
  border:1px solid var(--border);
}
.chat-header-info{flex:1}
.chat-header-name{font-size:1rem;font-weight:700;color:var(--text-bright)}
.chat-header-role{font-size:.75rem;color:var(--text-dim)}
.chat-header-back{
  background:none;border:none;color:var(--text-dim);
  font-size:1.2rem;cursor:pointer;padding:.4rem;
  text-decoration:none;
}
.chat-header-back:hover{color:var(--text-bright)}

/* Chat Area */
.chat-area{
  flex:1;overflow-y:auto;padding:1.5rem 1rem;
  max-width:800px;width:100%;margin:0 auto;
}
.message{
  display:flex;gap:.75rem;margin-bottom:1.25rem;
  animation:msgIn .3s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.bot{flex-direction:row}
.message.user{flex-direction:row-reverse}
.msg-avatar{
  width:36px;height:36px;border-radius:10px;object-fit:cover;
  flex-shrink:0;border:1px solid var(--border);
}
.msg-bubble{
  max-width:75%;padding:.75rem 1rem;border-radius:14px;
  font-size:.95rem;line-height:1.6;
}
.message.bot .msg-bubble{
  background:var(--card);border:1px solid var(--border);
  border-top-left-radius:4px;
}
.message.user .msg-bubble{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;border-top-right-radius:4px;
}

/* Quick Actions */
.quick-actions{
  display:flex;flex-wrap:wrap;gap:.5rem;
  margin-top:.75rem;padding-top:.75rem;
  border-top:1px solid var(--border);
}
.quick-btn{
  padding:.45rem .85rem;background:rgba(79,140,255,.1);
  border:1px solid rgba(79,140,255,.25);border-radius:20px;
  color:var(--blue);font-size:.85rem;cursor:pointer;
  transition:all .2s;
}
.quick-btn:hover{
  background:rgba(79,140,255,.2);
  border-color:var(--blue);
}

/* Input Area */
.chat-input-area{
  background:rgba(15,17,23,.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  padding:.8rem 1rem;position:sticky;bottom:0;
}
.chat-input-wrap{
  max-width:800px;margin:0 auto;
  display:flex;gap:.5rem;align-items:flex-end;
}
.chat-input{
  flex:1;padding:.7rem 1rem;
  background:var(--card);border:1px solid var(--border);
  border-radius:24px;color:var(--text);
  font-size:.95rem;resize:none;
  outline:none;transition:border-color .2s;
  max-height:120px;
}
.chat-input:focus{border-color:var(--blue)}
.chat-input::placeholder{color:var(--text-dim)}
.chat-send-btn{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border:none;color:#fff;font-size:1.2rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .2s,box-shadow .2s;flex-shrink:0;
}
.chat-send-btn:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(79,140,255,.4)}
.chat-hint{
  text-align:center;font-size:.75rem;color:var(--text-dim);
  margin-top:.4rem;
}

/* Agent color themes */
.theme-boss .msg-bubble.bot{border-left:3px solid var(--gold)}
.theme-boss .quick-btn{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.25);color:var(--gold)}
.theme-boss .quick-btn:hover{background:rgba(251,191,36,.2);border-color:var(--gold)}
.theme-boss .chat-send-btn{background:linear-gradient(135deg,var(--gold),#f59e0b)}

.theme-manager .msg-bubble.bot{border-left:3px solid var(--blue)}
.theme-manager .quick-btn{background:rgba(79,140,255,.1);border-color:rgba(79,140,255,.25);color:var(--blue)}
.theme-manager .quick-btn:hover{background:rgba(79,140,255,.2);border-color:var(--blue)}

.theme-marketing .msg-bubble.bot{border-left:3px solid var(--purple)}
.theme-marketing .quick-btn{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.25);color:var(--purple)}
.theme-marketing .quick-btn:hover{background:rgba(168,85,247,.2);border-color:var(--purple)}
.theme-marketing .chat-send-btn{background:linear-gradient(135deg,var(--purple),#ec4899)}

/* Responsive */
@media(max-width:600px){
  .msg-bubble{max-width:85%}
  .chat-area{padding:1rem .75rem}
}
</style>

// Render welcome message
function renderMessage(text, type) {
  var area = document.getElementById('chatArea');
  var msg = document.createElement('div');
  msg.className = 'message ' + type;
  
  var avatarHtml = '';
  if (type === 'bot') {
    avatarHtml = '<img class="msg-avatar" src="' + agent.avatar + '" alt="' + agent.name + '">';
  }
  
  // Convert markdown-like links to clickable
  var formattedText = text.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2.html" target="_blank" style="color:inherit;text-decoration:underline">$1</a>');
  formattedText = formattedText.replace(/\n/g, '<br>');
  
  msg.innerHTML = avatarHtml + '<div class="msg-bubble">' + formattedText + '</div>';
  area.appendChild(msg);
  area.scrollTop = area.scrollHeight;
}

function renderQuickActions() {
  var area = document.getElementById('chatArea');

  actionsDiv.id = 'currentActions';

var COZE_API = 'https://api.coze.cn';
var COZE_TOKEN = 'sat_LvCuUkueRmeZlNEJFdSBf1qXCu61fPi32jkbpTWKpktSUkTVY6oH16QKqYLQNIfY';
var USER_ID = 'web_user_' + Date.now();

// Call Coze Bot API
async function callCozeBot(message) {
  var botId = agent.botId;
  if (!botId) {
    return 'AI助手配置中，请稍后再试。';
  }
  
  // Show typing indicator
  var area = document.getElementById('chatArea');
  var typingMsg = document.createElement('div');
  typingMsg.className = 'message bot';
  typingMsg.id = 'typingIndicator';
  typingMsg.innerHTML = '<img class="msg-avatar" src="' + agent.avatar + '" alt=""><div class="msg-bubble" style="color:var(--text-dim)">思考中...</div>';
  area.appendChild(typingMsg);
  area.scrollTop = area.scrollHeight;

  try {
    // Step 1: Send message
    var resp = await fetch(COZE_API + '/v3/chat', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + COZE_TOKEN,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        bot_id: botId,
        user_id: USER_ID,
        stream: false,
        additional_messages: [{ role: 'user', content: message, content_type: 'text' }]
      })
    });
    var data = await resp.json();
    
    if (data.code !== 0) {
      throw new Error(data.msg || 'API返回错误');
    }
    
    var chatId = data.data.id;
    var convId = data.data.conversation_id;
    
    // Step 2: Poll for result
    var attempts = 0;
    var maxAttempts = 30;
    while (attempts < maxAttempts) {
      await new Promise(r => setTimeout(r, 1000));
      var pollResp = await fetch(COZE_API + '/v3/chat/retrieve?chat_id=' + chatId + '&conversation_id=' + convId, {
        headers: { 'Authorization': 'Bearer ' + COZE_TOKEN }
      });
      var pollData = await pollResp.json();
      
      if (pollData.data && pollData.data.status === 'completed') {
        // Step 3: Get message list
        var msgResp = await fetch(COZE_API + '/v3/chat/message/list?chat_id=' + chatId + '&conversation_id=' + convId, {
          headers: { 'Authorization': 'Bearer ' + COZE_TOKEN }
        });
        var msgData = await msgResp.json();
        
        if (msgData.data && msgData.data.length > 0) {
          // Find the assistant's response
          for (var i = msgData.data.length - 1; i >= 0; i--) {
            if (msgData.data[i].role === 'assistant' && msgData.data[i].type === 'answer') {
              var typingEl = document.getElementById('typingIndicator');
              if (typingEl) typingEl.remove();
              return msgData.data[i].content;
            }
          }
        }
        var typingEl2 = document.getElementById('typingIndicator');
        if (typingEl2) typingEl2.remove();
        return '收到，但目前无法生成回复，请重试。';
      }
      
      if (pollData.data && pollData.data.status === 'failed') {
        throw new Error(pollData.data.last_error?.msg || '处理失败');
      }
      
      attempts++;
    }
    
    var typingEl3 = document.getElementById('typingIndicator');
    if (typingEl3) typingEl3.remove();
    return '回复超时，请重试。';
  } catch (e) {
    var typingEl4 = document.getElementById('typingIndicator');
    if (typingEl4) typingEl4.remove();
    console.error('Coze API Error:', e);
    return 'AI助手暂时无法响应：' + (e.message || '未知错误') + '\n\n请稍后重试，或添加微信 Air19770809 咨询人工客服。';
  }
}

  if (oldActions) oldActions.remove();
  
  renderMessage(action.label, 'user');
  
  callCozeBot(action.label).then(function(response) {
    renderMessage(response, 'bot');
    renderQuickActions();
  });
}

// Send message
function sendMessage() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  
  var oldActions = document.getElementById('currentActions');
  if (oldActions) oldActions.remove();
  
  renderMessage(text, 'user');
  input.value = '';
  input.style.height = 'auto';
  
  callCozeBot(text).then(function(response) {
    renderMessage(response, 'bot');
    renderQuickActions();
  });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// Auto-resize textarea
document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Initial render
renderMessage(agent.welcome, 'bot');
renderQuickActions();
</script>
</body>
</html>
